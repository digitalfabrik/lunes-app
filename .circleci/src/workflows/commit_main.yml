when:
  or:
    - equal: [<< pipeline.parameters.run_commit_main >>, 'run']
    - and:
        - equal: [<< pipeline.parameters.run_commit_main >>, 'run_if_on_main']
        - equal: [main, << pipeline.git.branch >>]
jobs:
  - check:
      context:
        - mattermost
  - bump_version:
      context:
        - mattermost
      prepare_delivery: false
  - build_android:
      context:
        - mattermost
        - credentials-repo
        - credentials-lunes
      requires:
        - check
        - bump_version
  - build_ios:
      context:
        - mattermost
        - fastlane-match
        - tuerantuer-apple
      requires:
        - check
        - bump_version
