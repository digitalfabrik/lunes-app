docker:
  - image: cimg/node:24.18.0
resource_class: small
environment:
  FASTLANE_SKIP_UPDATE_CHECK: true
shell: /bin/bash -eo pipefail
steps:
  - checkout
  - restore_yarn_tools_cache
  - run:
      name: Remove prerelease flag from github release
      command: |
        GITHUB_RELEASE=$(yarn run --silent app-toolbelt v0 release promote --platform all --private-key ${DELIVERINO_PRIVATE_KEY} --owner ${CIRCLE_PROJECT_USERNAME} --repo ${CIRCLE_PROJECT_REPONAME})
        echo "export GITHUB_RELEASE='${GITHUB_RELEASE}'" >> $BASH_ENV
      working_directory: tools
  - notify:
      success_message: 'Lunes - ${GITHUB_RELEASE} - has been promoted successfully :tada:'
      channel: releases
