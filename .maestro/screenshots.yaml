appId: app.lunes
name: Lunes store screenshots
---
- clearState
- launchApp:
    permissions:
      all: allow

# 00 — Onboarding scope screen ("Willkommen bei Lunes!" + jobs list).
- extendedWaitUntil:
    visible: 'Willkommen bei Lunes!'
    timeout: 30000
- extendedWaitUntil:
    notVisible:
      id: 'loading'
    timeout: 15000
- waitForAnimationToEnd
- takeScreenshot: ${OUTPUT_DIR}/00_onboarding
- tapOn: 'Überspringen'

# Dismiss analytics-consent modal if it appears.
- runFlow:
    when:
      visible: 'Hilf uns, Lunes zu verbessern'
    commands:
      - tapOn: 'Nicht jetzt'

# Open settings → unlock debug → seed deterministic screenshot data.
- tapOn: 'Menü'
- tapOn: 'Einstellungen'
- tapOn:
    text: 'Version: .*'
    repeat: 6
- tapOn: 'Development Code'
- inputText: 'wirschaffendas'
- hideKeyboard
- tapOn:
    id: 'debug-seed-screenshot-data'
- tapOn: 'Schließen'

# 01 — Home tab with seeded selected jobs.
# The (,.*)? tail matches both Android ("Start") and iOS, where the OS
# decorates tab labels into "Start, tab, 1 of 4" for VoiceOver.
- tapOn: 'Start(,.*)?'
- extendedWaitUntil:
    notVisible:
      id: 'loading'
    timeout: 15000
- waitForAnimationToEnd
- takeScreenshot: ${OUTPUT_DIR}/01_home

# Open the unit list (UnitSelection) for the first job.
- tapOn:
    text: 'Übung starten'
    index: 0
- extendedWaitUntil:
    notVisible:
      id: 'loading'
    timeout: 15000
- waitForAnimationToEnd

# Select the first unit, then start the WordChoice exercise (unlocked by the seeded screenshot data).
- tapOn:
    id: 'list-item'
    index: 0
- extendedWaitUntil:
    notVisible:
      id: 'loading'
    timeout: 15000
- waitForAnimationToEnd

# 02 — WordChoice exercise (article + word selection).
- tapOn: 'Übung.*'
- extendedWaitUntil:
    notVisible:
      id: 'loading'
    timeout: 15000
- tapOn:
    id: 'word-item'
- waitForAnimationToEnd
- takeScreenshot: ${OUTPUT_DIR}/02_word_choice
- tapOn: 'Nächstes Wort'

# Exit out of the exercise back to the home stack root.
- tapOn: 'Übung beenden'
- tapOn: 'Beenden'
- back
- back

# 03 — Dictionary tab.
- tapOn: 'Suche(,.*)?'
- extendedWaitUntil:
    notVisible:
      id: 'loading'
    timeout: 15000
- waitForAnimationToEnd
- takeScreenshot: ${OUTPUT_DIR}/03_dictionary

# 04 — Repetition tab.
- tapOn: 'Vertiefen(,.*)?'
- waitForAnimationToEnd
- takeScreenshot: ${OUTPUT_DIR}/04_repetition

# 05 — Image training exercise.
# Two taps to reset to the home screen, one tap only goes back to the units screen
- tapOn:
    text: 'Start.*'
    repeat: 2
- tapOn:
    text: 'Übung starten'
    index: 1
- extendedWaitUntil:
    notVisible:
      id: 'loading'
    timeout: 15000
- tapOn: 'Bilderrätsel.*'
- tapOn:
    id: 'imageOption'
- waitForAnimationToEnd
- takeScreenshot: ${OUTPUT_DIR}/05_image_training

- tapOn: 'Übung beenden'
- tapOn: 'Beenden'
- waitForAnimationToEnd

# 06 — Speech training
- tapOn: 'Sprechstudio.*'
- waitForAnimationToEnd
- takeScreenshot: ${OUTPUT_DIR}/06_speech_training

- tapOn: 'Übung beenden'
- tapOn: 'Beenden'
- waitForAnimationToEnd

# 07 — Sentence training
- tapOn: 'Satzbausteine.*'
- waitForAnimationToEnd
- takeScreenshot: ${OUTPUT_DIR}/07_sentence_training
